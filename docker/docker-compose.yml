services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - searxng-data:/etc/searxng
    restart: unless-stopped

  kagura:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      SEARXNG_URL: http://searxng:8080
    ports:
      - "3100:3100"
    depends_on:
      - searxng
    restart: unless-stopped

volumes:
  searxng-data:
